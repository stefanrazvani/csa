name: csa

services:
  mongo:
    image: mongo:8.0.26
    restart: unless-stopped
    command:
      - bash
      - -lc
      - >-
        cp /run/secrets/mongo-keyfile /data/configdb/keyfile &&
        chown mongodb:mongodb /data/configdb/keyfile &&
        chmod 400 /data/configdb/keyfile &&
        exec docker-entrypoint.sh mongod --replSet csa-rs --bind_ip_all --auth --keyFile /data/configdb/keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    secrets:
      - mongo-keyfile
    volumes:
      - csa_mongo_data:/data/db
      - csa_mongo_config:/data/configdb
    networks:
      - csa_internal
      - csa_content_internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host 127.0.0.1 --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ping:1}).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    logging:
      options:
        max-size: 20m
        max-file: "5"

  meteor:
    image: csa/meteor:3.4-passenger-6.1.7
    build:
      context: ./meteor-image
    restart: unless-stopped
    env_file:
      - ./secrets/mail.env
    command:
      - bash
      - -lc
      - >-
        chown -R 10000:10001 /var/meteor /home/urgentit &&
        meteor_node=$$(find /home/urgentit/.meteor/packages/meteor-tool -path '*/dev_bundle/bin/node' -type f | head -n 1) &&
        test -n "$$meteor_node" &&
        ln -sf "$$meteor_node" /usr/local/bin/csa-node &&
        sed -i '1i env CSA_MAIL_FROM;\nenv MAIL_URL;\nenv MONGO_URL;\nenv ROOT_URL;' /etc/nginx/nginx.conf &&
        rm -rf /etc/service/csa-meteor &&
        cp /opt/csa/nginx-run /etc/service/nginx/run &&
        chmod 755 /etc/service/nginx/run &&
        rm -f /etc/service/nginx/down &&
        exec /sbin/my_init
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      HOME: /home/urgentit
      MONGO_URL: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/csa?authSource=csa&replicaSet=csa-rs
      ROOT_URL: ${CSA_ROOT_URL}
      CSA_LEGACY_EID: ${CSA_LEGACY_EID}
      CSA_LEGACY_MONGO_URL: ${CSA_LEGACY_MONGO_URL:-}
      CSA_CRAFT_ADMIN_GRADE_BYPASS: "${CSA_CRAFT_ADMIN_GRADE_BYPASS:-0}"
      CSA_TENANT_ADMIN_EMAILS: ${CSA_TENANT_ADMIN_EMAILS:-}
      CSA_PLATFORM_ADMIN_EMAILS: ${CSA_PLATFORM_ADMIN_EMAILS:-razvan.stefan.i@gmail.com}
      CSA_BOOTSTRAP_ADMIN_EMAIL: ${CSA_BOOTSTRAP_ADMIN_EMAIL:-}
      CSA_BOOTSTRAP_ADMIN_PASSWORD: ${CSA_BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      - csa_meteor_data:/var/meteor
      - csa_meteor_home:/home/urgentit
      - ./nginx/csa.conf:/etc/nginx/sites-available/default:ro
      - ./runit/nginx/run:/opt/csa/nginx-run:ro
    ports:
      - "192.168.177.68:18600:80"
      - "192.168.177.68:22223:22"
    networks:
      - csa_internal
      - csa_content_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s
    logging:
      options:
        max-size: 20m
        max-file: "5"

  meteor-portal:
    image: csa/meteor:3.4-passenger-6.1.7
    restart: unless-stopped
    env_file:
      - ./secrets/mail.env
    command:
      - bash
      - -lc
      - >-
        chown -R 10000:10001 /var/meteor /home/urgentit &&
        meteor_node=$$(find /home/urgentit/.meteor/packages/meteor-tool -path '*/dev_bundle/bin/node' -type f | head -n 1) &&
        test -n "$$meteor_node" &&
        ln -sf "$$meteor_node" /usr/local/bin/csa-node &&
        sed -i '1i env CSA_GATEWAY_SECRET;\nenv CSA_MAIL_FROM;\nenv MAIL_URL;\nenv MONGO_URL;\nenv ROOT_URL;' /etc/nginx/nginx.conf &&
        rm -rf /etc/service/csa-meteor &&
        cp /opt/csa/nginx-run /etc/service/nginx/run &&
        chmod 755 /etc/service/nginx/run &&
        rm -f /etc/service/nginx/down &&
        exec /sbin/my_init
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      HOME: /home/urgentit
      MONGO_URL: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/csa?authSource=csa&replicaSet=csa-rs
      ROOT_URL: ${CSA_GATEWAY_ORIGIN}/portal
      CSA_GATEWAY_SECRET: ${CSA_GATEWAY_SECRET}
      CSA_LEGACY_EID: ${CSA_LEGACY_EID}
      CSA_LEGACY_MONGO_URL: ""
      CSA_CRAFT_ADMIN_GRADE_BYPASS: "${CSA_CRAFT_ADMIN_GRADE_BYPASS:-0}"
      CSA_TENANT_ADMIN_EMAILS: ${CSA_TENANT_ADMIN_EMAILS:-}
      CSA_PLATFORM_ADMIN_EMAILS: ${CSA_PLATFORM_ADMIN_EMAILS:-razvan.stefan.i@gmail.com}
      CSA_BOOTSTRAP_ADMIN_EMAIL: ""
      CSA_BOOTSTRAP_ADMIN_PASSWORD: ""
    volumes:
      - csa_meteor_data:/var/meteor
      - csa_meteor_home:/home/urgentit
      - ./nginx/csa-portal.conf:/etc/nginx/sites-available/default:ro
      - ./runit/nginx/run:/opt/csa/nginx-run:ro
    networks:
      - csa_internal
      - csa_content_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s
    logging:
      options:
        max-size: 20m
        max-file: "5"

  gateway-auth:
    image: csa/gateway-auth:1.0.0
    build:
      context: ./gateway-auth
    restart: unless-stopped
    env_file:
      - ./secrets/mail.env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: "3000"
      MONGO_URL: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/csa?authSource=csa&replicaSet=csa-rs
      CSA_GATEWAY_SECRET: ${CSA_GATEWAY_SECRET}
      CSA_GATEWAY_ORIGIN: ${CSA_GATEWAY_ORIGIN}
      CSA_GATEWAY_COOKIE_SECURE: ${CSA_GATEWAY_COOKIE_SECURE:-0}
      CSA_GATEWAY_SESSION_HOURS: ${CSA_GATEWAY_SESSION_HOURS:-8}
      CSA_LEGACY_EID: ${CSA_LEGACY_EID}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: csa-documents
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio-root-user
      MINIO_SECRET_KEY_FILE: /run/secrets/minio-root-password
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
    secrets:
      - minio-root-user
      - minio-root-password
    networks:
      - csa_internal
      - csa_content_internal
    tmpfs:
      - /tmp:size=300m,mode=1777
    mem_limit: 1g
    cpus: "1.00"
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    logging:
      options:
        max-size: 20m
        max-file: "5"

  gateway:
    image: nginx:1.28.0-alpine3.21
    restart: unless-stopped
    depends_on:
      gateway-auth:
        condition: service_healthy
      meteor-portal:
        condition: service_healthy
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/public:/usr/share/nginx/html:ro
      - ../csa-app/public/img/nova-reperta.png:/usr/share/nginx/html/img/nova-reperta.png:ro
    ports:
      - "192.168.177.68:18610:80"
    networks:
      - csa_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 10s
    logging:
      options:
        max-size: 20m
        max-file: "5"

  minio:
    image: ${CSA_MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio-root-user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio-root-password
    secrets:
      - minio-root-user
      - minio-root-password
    volumes:
      - csa_minio_data:/data
    networks:
      - csa_content_internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    mem_limit: 2g
    cpus: "1.00"
    pids_limit: 512
    logging:
      options:
        max-size: 20m
        max-file: "5"

  clamav:
    image: csa/clamav:1.4.3
    build:
      context: ./clamav
      args:
        CLAMAV_BASE_IMAGE: ${CSA_CLAMAV_BASE_IMAGE:-clamav/clamav:1.4.3}
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    volumes:
      - csa_clamav_signatures:/var/lib/clamav
    networks:
      - csa_content_internal
      - csa_internal
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --no-summary /etc/hosts >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 180s
    mem_limit: 4g
    cpus: "1.00"
    pids_limit: 256
    logging:
      options:
        max-size: 20m
        max-file: "5"

  arangodb:
    image: ${CSA_ARANGODB_IMAGE:-arangodb:3.12.5}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        export ARANGO_ROOT_PASSWORD="$$(cat /run/secrets/arangodb-root-password)" &&
        exec /entrypoint.sh arangod --server.endpoint tcp://0.0.0.0:8529
    secrets:
      - arangodb-root-password
    volumes:
      - csa_arangodb_data:/var/lib/arangodb3
    networks:
      - csa_content_internal
    healthcheck:
      test: ["CMD-SHELL", "arangosh --server.endpoint tcp://127.0.0.1:8529 --server.username root --server.password \"$$(cat /run/secrets/arangodb-root-password)\" --javascript.execute-string 'db._version();' >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 60s
    mem_limit: 2g
    cpus: "1.00"
    pids_limit: 512
    logging:
      options:
        max-size: 20m
        max-file: "5"

  opensearch:
    image: csa/opensearch:3.7.0
    build:
      context: ./opensearch
      args:
        OPENSEARCH_BASE_IMAGE: ${CSA_OPENSEARCH_IMAGE:-opensearchproject/opensearch:3.7.0}
    restart: unless-stopped
    environment:
      cluster.name: csa-search
      node.name: csa-opensearch
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      path.repo: /usr/share/opensearch/snapshots
      OPENSEARCH_JAVA_OPTS: -Xms2g -Xmx2g
    secrets:
      - opensearch-admin-password
    volumes:
      - csa_opensearch_data:/usr/share/opensearch/data
      - csa_search_snapshots:/usr/share/opensearch/snapshots
    networks:
      - csa_content_internal
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail --insecure --user admin:\"$$(cat /run/secrets/opensearch-admin-password)\" https://127.0.0.1:9200/_cluster/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 40
      start_period: 120s
    mem_limit: 4g
    cpus: "2.00"
    pids_limit: 1024
    logging:
      options:
        max-size: 20m
        max-file: "5"

  content-worker:
    image: csa/content-worker:1.0.0
    build:
      context: ./content-worker
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      arangodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/csa?authSource=csa&replicaSet=csa-rs
      MONGO_DB: csa
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY_FILE: /run/secrets/minio-root-user
      MINIO_SECRET_KEY_FILE: /run/secrets/minio-root-password
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      OPENSEARCH_URL: https://opensearch:9200/
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD_FILE: /run/secrets/opensearch-admin-password
      OPENSEARCH_TLS_REJECT_UNAUTHORIZED: "0"
      ARANGO_URL: http://arangodb:8529/_db/csa/
      ARANGO_USERNAME: root
      ARANGO_PASSWORD_FILE: /run/secrets/arangodb-root-password
      WORKER_CONCURRENCY: "2"
      WORKER_POLL_MS: "3000"
      WORKER_MAX_ATTEMPTS: "3"
      WORKER_MIN_TEXT_CHARS: "40"
      WORKER_MAX_SOURCE_BYTES: "262144000"
    secrets:
      - minio-root-user
      - minio-root-password
      - opensearch-admin-password
      - arangodb-root-password
    networks:
      - csa_content_internal
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 2g
    cpus: "1.50"
    pids_limit: 256
    tmpfs:
      - /tmp:size=1g,mode=1777
    logging:
      options:
        max-size: 20m
        max-file: "5"

networks:
  csa_internal:
    name: csa_internal
    driver: bridge
  csa_content_internal:
    name: csa_content_internal
    driver: bridge
    internal: true

volumes:
  csa_mongo_data:
    name: csa_mongo_data
    external: true
  csa_mongo_config:
    name: csa_mongo_config
    external: true
  csa_meteor_data:
    name: csa_meteor_data
    external: true
  csa_meteor_home:
    name: csa_meteor_home
    external: true
  csa_minio_data:
    name: csa_minio_data
    external: true
  csa_arangodb_data:
    name: csa_arangodb_data
    external: true
  csa_opensearch_data:
    name: csa_opensearch_data
    external: true
  csa_search_snapshots:
    name: csa_search_snapshots
    external: true
  csa_clamav_signatures:
    name: csa_clamav_signatures
    external: true

secrets:
  mongo-keyfile:
    file: ./secrets/mongo-keyfile
  minio-root-user:
    file: ./secrets/minio-root-user
  minio-root-password:
    file: ./secrets/minio-root-password
  arangodb-root-password:
    file: ./secrets/arangodb-root-password
  opensearch-admin-password:
    file: ./secrets/opensearch-admin-password
