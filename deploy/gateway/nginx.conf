map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
  listen 80 default_server;
  server_name _;
  server_tokens off;
  absolute_redirect off;
  client_max_body_size 64k;
  root /usr/share/nginx/html;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location = /_gateway_auth {
    internal;
    proxy_pass http://gateway-auth:3000/auth/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /auth/ {
    limit_req zone=auth_limit burst=8 nodelay;
    proxy_pass http://gateway-auth:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_buffering off;
  }

  location ^~ /portal-api/ {
    client_max_body_size 250m;
    auth_request /_gateway_auth;
    error_page 401 = @api_unauthorized;
    proxy_pass http://gateway-auth:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location = /portal {
    auth_request /_gateway_auth;
    error_page 401 = @public_login;
    return 308 /portal/;
  }

  location ^~ /portal/ {
    auth_request /_gateway_auth;
    error_page 401 = @public_login;
    proxy_pass http://meteor-portal;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  location @public_login {
    return 302 /?login=required;
  }

  location @api_unauthorized {
    default_type application/json;
    return 401 '{"error":"Sesiunea a expirat."}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
