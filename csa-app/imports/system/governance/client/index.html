<template name="governanceAdmin">
  <div class="governance-page"><header class="governance-hero"><span>Secretariat</span><h1>Registru matricol și funcții</h1><p>Apartenențe, parcurs pe grade, echipa anului masonic și jurnalul administrativ.</p></header>
    {{#if message}}<div class="alert alert-info">{{message}}</div>{{/if}}
    <nav class="governance-tabs" aria-label="Secțiuni"><button class="{{tabActive 'members'}} js-governance-tab" data-tab="members">Matricol</button><button class="{{tabActive 'offices'}} js-governance-tab" data-tab="offices">Funcții anuale</button><button class="{{tabActive 'audit'}} js-governance-tab" data-tab="audit">Audit</button></nav>
    {{#if isTab 'members'}}
      <section class="governance-panel"><h2>Actualizează apartenența</h2><form id="membershipForm" class="row g-3"><div class="col-md-4"><label class="form-label">Utilizator</label><select class="form-select" name="userId" required><option value="">Selectează</option>{{#each users}}<option value="{{_id}}">{{displayName}} · {{email}}</option>{{/each}}</select></div><div class="col-md-3"><label class="form-label">Nr. matricol</label><input class="form-control" name="matriculationNo" required></div><div class="col-md-3"><label class="form-label">Statut</label><select class="form-select" name="status"><option value="active">Activ</option><option value="suspended">Suspendat</option><option value="inactive">Inactiv</option><option value="left">Plecat</option></select></div><div class="col-md-2 d-flex align-items-end"><button class="btn btn-primary w-100">Salvează</button></div></form></section>
      <section class="governance-panel"><h2>Înregistrează grad</h2><form id="degreeForm" class="row g-3"><div class="col-md-4"><select class="form-select" name="userId" required><option value="">Utilizator</option>{{#each users}}<option value="{{_id}}">{{displayName}}</option>{{/each}}</select></div><div class="col-md-2"><select class="form-select" name="grade"><option value="1">Ucenic · 1</option><option value="2">Calfă · 2</option><option value="3">Maestru · 3</option></select></div><div class="col-md-3"><input class="form-control" name="effectiveAt" placeholder="13.07.2026" required></div><div class="col-md-3"><input class="form-control" name="note" placeholder="Notă"></div><div class="col-12"><button class="btn btn-primary">Înregistrează în istoric</button></div></form></section>
      <section class="governance-panel"><h2>Membrii Loji</h2><div class="table-responsive"><table class="table table-dark align-middle"><thead><tr><th>Matricol</th><th>Membru</th><th>Email</th><th>Grad</th><th>Statut</th><th>Intrare</th></tr></thead><tbody>{{#each members}}<tr><td>{{matriculationNo}}</td><td>{{displayName}}</td><td>{{email}}</td><td><span class="governance-grade">{{gradeLabel currentGrade}}</span></td><td>{{status}}</td><td>{{formatDate joinedAt}}</td></tr>{{else}}<tr><td colspan="6" class="text-center text-muted">Registrul este gol.</td></tr>{{/each}}</tbody></table></div></section>
    {{/if}}
    {{#if isTab 'offices'}}
      <section class="governance-panel"><h2>Alocă funcție</h2><form id="officeTermForm" class="row g-3"><div class="col-md-3"><select class="form-select" name="userId" required><option value="">Membru</option>{{#each users}}<option value="{{_id}}">{{displayName}}</option>{{/each}}</select></div><div class="col-md-3"><select class="form-select" name="officeCode" required><option value="">Funcție</option>{{#each officeDefinitions}}<option value="{{code}}">{{name}}</option>{{/each}}</select></div><div class="col-md-2"><input class="form-control" name="masonicYear" placeholder="6026–6027" required></div><div class="col-md-2"><input class="form-control" name="startAt" placeholder="01.09.2026" required></div><div class="col-md-2"><input class="form-control" name="endAt" placeholder="31.08.2027" required></div><div class="col-12"><button class="btn btn-primary">Alocă mandatul</button></div></form></section>
      <section class="governance-office-grid">{{#each officeTerms}}<article><span>{{masonicYear}}</span><h2>{{officeName officeCode}}</h2><p>{{userName userId}}</p><small>{{formatDate startAt}} — {{formatDate endAt}}</small>{{#if activeOffice status}}<button class="btn btn-sm btn-outline-danger js-revoke-office" data-id="{{_id}}">Revocă</button>{{/if}}</article>{{else}}<div class="governance-panel">Nu există mandate.</div>{{/each}}</section>
    {{/if}}
    {{#if isTab 'audit'}}
      <section class="governance-panel"><h2>Evenimente recente</h2><div class="table-responsive"><table class="table table-dark table-sm"><thead><tr><th>Moment</th><th>Actor</th><th>Acțiune</th><th>Entitate</th><th>Rezultat</th><th>Cross-tenant</th></tr></thead><tbody>{{#each auditEvents}}<tr><td>{{formatDateTime at}}</td><td><code>{{actorId}}</code></td><td>{{action}}</td><td>{{entityType}} {{entityId}}</td><td>{{outcome}}</td><td>{{yesNo crossTenant}}</td></tr>{{else}}<tr><td colspan="6" class="text-muted text-center">Nu există evenimente.</td></tr>{{/each}}</tbody></table></div></section>
    {{/if}}
  </div>
</template>
