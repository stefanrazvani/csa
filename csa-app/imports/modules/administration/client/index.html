<template name="treasuryWorkspace">
  <div class="admin-room admin-room-treasury"><header><span>Camera Trezorierului</span><h1>Metale</h1><p>Bugete, cotizații și registrul mișcărilor, păstrate cu trasabilitate.</p></header>
    {{#if message}}<div class="alert alert-info">{{message}}</div>{{/if}}
    {{#if canWrite}}
      <div class="admin-room-grid">
        <form id="treasuryPeriodForm" class="admin-room-panel"><h2>Perioadă</h2><input class="form-control" name="year" placeholder="An masonic 6026–6027" required><input class="form-control" name="startsAt" placeholder="01.09.2026" required><input class="form-control" name="endsAt" placeholder="31.08.2027" required><button class="btn btn-primary">Deschide</button></form>
        <form id="treasuryAccountForm" class="admin-room-panel"><h2>Cont</h2><input class="form-control" name="code" placeholder="CASA" required><input class="form-control" name="name" placeholder="Casa Loji" required><select class="form-select" name="type"><option value="cash">Numerar</option><option value="bank">Bancă</option><option value="reserve">Rezervă</option></select><input class="form-control" name="openingBalance" type="number" step="0.01" min="0" placeholder="Sold inițial"><button class="btn btn-primary">Creează</button></form>
        <form id="treasuryTransactionForm" class="admin-room-panel"><h2>Mișcare nouă</h2><select class="form-select" name="periodId" required><option value="">Perioadă</option>{{#each periods}}<option value="{{_id}}">{{year}}</option>{{/each}}</select><select class="form-select" name="accountId" required><option value="">Cont</option>{{#each accounts}}<option value="{{_id}}">{{code}} · {{name}}</option>{{/each}}</select><select class="form-select" name="direction"><option value="income">Încasare</option><option value="expense">Plată</option></select><input class="form-control" name="amount" type="number" step="0.01" min="0.01" placeholder="Sumă RON" required><input class="form-control" name="occurredAt" placeholder="13.07.2026" required><input class="form-control" name="category" placeholder="Categorie"><textarea class="form-control" name="description" placeholder="Explicație"></textarea><button class="btn btn-primary">Salvează draft</button></form>
      </div>
    {{/if}}
    <section class="admin-room-stats"><article><span>Sold înregistrat</span><strong>{{formatMoney postedBalance}}</strong></article><article><span>Încasări</span><strong>{{formatMoney totalIncome}}</strong></article><article><span>Plăți</span><strong>{{formatMoney totalExpense}}</strong></article></section>
    <section class="admin-room-panel"><h2>Registru</h2><div class="table-responsive"><table class="table table-dark table-hover align-middle"><thead><tr><th>Data</th><th>Tip</th><th>Categorie</th><th>Explicație</th><th>Sumă</th><th>Stare</th><th></th></tr></thead><tbody>{{#each transactions}}<tr><td>{{formatDate occurredAt}}</td><td>{{directionLabel direction}}</td><td>{{category}}</td><td>{{description}}</td><td>{{signedMoney this}}</td><td>{{status}}</td><td>{{#if canWrite}}{{#if isDraft status}}<button class="btn btn-sm btn-outline-warning js-approve-transaction" data-id="{{_id}}">Aprobă</button>{{/if}}{{#if isApproved status}}<button class="btn btn-sm btn-outline-success js-post-transaction" data-id="{{_id}}">Înregistrează</button>{{/if}}{{/if}}</td></tr>{{else}}<tr><td colspan="7" class="text-center text-muted">Nu există mișcări.</td></tr>{{/each}}</tbody></table></div></section>
  </div>
</template>

<template name="hospitalityWorkspace">
  <div class="admin-room admin-room-hospitality"><header><span>Camera Ospitalierului</span><h1>Ospitalier</h1><p>Evenimente, legături fraterne și sprijin discret.</p></header>{{#if message}}<div class="alert alert-info">{{message}}</div>{{/if}}
    {{#if canWrite}}<div class="admin-room-grid"><form id="hospitalityEventForm" class="admin-room-panel"><h2>Eveniment</h2><input class="form-control" name="title" placeholder="Titlu" required><input class="form-control" name="startsAt" placeholder="13.07.2026 18:00" required><input class="form-control" name="endsAt" placeholder="13.07.2026 21:00"><input class="form-control" name="location" placeholder="Loc"><select class="form-select" name="minGrade"><option value="1">Grad 1+</option><option value="2">Grad 2+</option><option value="3">Grad 3</option></select><textarea class="form-control" name="description" placeholder="Descriere"></textarea><button class="btn btn-primary">Publică</button></form><form id="hospitalityCaseForm" class="admin-room-panel"><h2>Caz confidențial</h2><input class="form-control" name="subject" placeholder="Subiect" required><textarea class="form-control" rows="7" name="notes" placeholder="Note confidențiale"></textarea><button class="btn btn-primary">Deschide cazul</button></form></div>{{/if}}
    <section class="admin-room-panel"><h2>Evenimente</h2><div class="event-cards">{{#each events}}<article><span>Grad {{minGrade}}+</span><h3>{{title}}</h3><time>{{formatDateTime startsAt}}</time><p>{{location}}</p><p>{{description}}</p></article>{{else}}<p class="text-muted">Nu există evenimente.</p>{{/each}}</div></section>
    {{#if canWrite}}<section class="admin-room-panel"><h2>Cazuri restricționate</h2>{{#each cases}}<article class="hospitality-case"><strong>{{subject}}</strong><span>{{status}}</span><p>{{notes}}</p></article>{{else}}<p class="text-muted">Nu există cazuri deschise.</p>{{/each}}</section>{{/if}}
  </div>
</template>

<template name="visitorWorkspace">
  <div class="admin-room admin-room-secretariat"><header><span>Secretariat</span><h1>Frați vizitatori</h1><p>Invitații limitate în timp și evidența Loji de proveniență.</p></header>{{#if message}}<div class="alert alert-info">{{message}}</div>{{/if}}
    {{#if canWrite}}<form id="visitorInvitationForm" class="admin-room-panel row g-3"><div class="col-md-4"><label class="form-label">Nume</label><input class="form-control" name="name" required></div><div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div><div class="col-md-4"><label class="form-label">Loja de proveniență</label><input class="form-control" name="originLodge" required></div><div class="col-md-4"><label class="form-label">Grad atestat</label><select class="form-select" name="attestedGrade"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div><div class="col-md-4"><label class="form-label">ID eveniment/convocator</label><input class="form-control" name="eventId" required></div><div class="col-md-4"><label class="form-label">Expiră</label><input class="form-control" name="accessExpiresAt" placeholder="15.07.2026 23:59" required></div><div class="col-12"><button class="btn btn-primary">Creează invitația</button></div></form>{{/if}}
    <section class="admin-room-panel"><div class="table-responsive"><table class="table table-dark"><thead><tr><th>Nume</th><th>Email</th><th>Loja</th><th>Grad</th><th>Status</th><th>Expiră</th></tr></thead><tbody>{{#each invitations}}<tr><td>{{name}}</td><td>{{email}}</td><td>{{originLodge}}</td><td>{{attestedGrade}}</td><td>{{status}}</td><td>{{formatDateTime accessExpiresAt}}</td></tr>{{else}}<tr><td colspan="6" class="text-muted text-center">Nu există invitații.</td></tr>{{/each}}</tbody></table></div></section>
  </div>
</template>
